name: Build MultiVersionPlugin

on:
  push:
    branches: [ main, master, dev ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  XMAKE_VERSION: '2.9.9'

jobs:
  build:
    name: Build (Windows x64)
    runs-on: windows-2022

    steps:
      # ── Чекаут репозитория ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Получаем только include/ из Protocol (без сборки!) ──────────────
      # Protocol уже установлен на сервере в libraries/ — нам нужны только
      # заголовки для компиляции плагина.
      - name: Checkout Protocol headers
        uses: actions/checkout@v4
        with:
          repository: SculkCatalystMC/Protocol
          path: vendor/Protocol
          sparse-checkout: include
          sparse-checkout-cone-mode: false

      # ── MSVC ─────────────────────────────────────────────────────────────
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # ── xmake ────────────────────────────────────────────────────────────
      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: ${{ env.XMAKE_VERSION }}

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake
            ${{ github.workspace }}/.xmake
          key: xmake-pkgs-${{ runner.os }}-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-pkgs-${{ runner.os }}-

      - name: Configure xmake
        env:
          # Сообщаем xmake.lua где лежат заголовки Protocol
          PROTOCOL_INCLUDE_DIR: vendor/Protocol/include
        run: xmake f -y -p windows -a x64 -m release

      - name: Build plugin
        env:
          PROTOCOL_INCLUDE_DIR: vendor/Protocol/include
        run: xmake build -v MultiVersionPlugin

      # ── Сбор артефактов ──────────────────────────────────────────────────
      - name: Collect outputs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist

          $dll = Get-ChildItem -Recurse -Filter "MultiVersionPlugin.dll" |
                 Where-Object { $_.FullName -notmatch '\\.xmake\\' } |
                 Select-Object -First 1

          if (-not $dll) {
            Write-Error "MultiVersionPlugin.dll not found!"
            exit 1
          }

          Copy-Item $dll.FullName dist\MultiVersionPlugin.dll
          Copy-Item manifest.json dist\manifest.json
          Write-Host "Collected: $($dll.FullName)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MultiVersionPlugin-windows-x64
          path: dist/
          retention-days: 30

  # ── Релиз (только для тегов v*.*.*) ─────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: MultiVersionPlugin-windows-x64
          path: dist/

      - name: Create release zip
        run: |
          cd dist
          zip -r ../MultiVersionPlugin-${{ github.ref_name }}-windows-x64.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MultiVersionPlugin-${{ github.ref_name }}-windows-x64.zip
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
